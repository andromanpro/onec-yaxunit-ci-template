groups:
  - name: host-health
    rules:
      - alert: DiskFull
        expr: 100 * (1 - node_filesystem_avail_bytes{mountpoint="/rootfs"} / node_filesystem_size_bytes{mountpoint="/rootfs"}) > 90
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Root filesystem занят > 90%"
          description: "{{ $value | printf \"%.1f\" }}% занято. Высокий риск out-of-space."

      - alert: HighMemory
        expr: 100 * (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) > 90
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Память занята > 90%"
          description: "{{ $value | printf \"%.1f\" }}% использовано. Возможен OOM kill."

  - name: docker-containers
    rules:
      - alert: ContainerRestartedRecently
        expr: changes(container_start_time_seconds{name!=""}[5m]) > 0
        for: 0m
        labels:
          severity: info
        annotations:
          summary: "Container {{ $labels.name }} перезапустился"

  - name: allure-ci
    rules:
      - alert: AllureCIFailingTests
        expr: allure_tests{status="failed"} > 0 or allure_tests{status="broken"} > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Allure project {{ $labels.project }}: красные тесты"
          description: "{{ $value }} тестов в статусе {{ $labels.status }} в последнем отчёте."

      - alert: AllureExporterDown
        expr: allure_exporter_up == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Allure exporter не отвечает"
          description: "Allure server недоступен или allure-exporter упал."
