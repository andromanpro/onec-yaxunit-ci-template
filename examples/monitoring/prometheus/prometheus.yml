global:
  scrape_interval: 30s
  evaluation_interval: 30s

alerting:
  alertmanagers:
    - static_configs:
        - targets: [alertmanager:9093]

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]

  - job_name: node-exporter
    static_configs:
      - targets: [node-exporter:9100]
        labels:
          host: ci-runner-host

  - job_name: cadvisor
    static_configs:
      - targets: [cadvisor:8080]
        labels:
          host: ci-runner-host

  - job_name: allure
    static_configs:
      - targets: [allure-exporter:9091]
